<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPW Order Tracking</title>

<style>
body{
    font-family: Arial,sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:30px;
}
.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}
h1{
    text-align:center;
}
input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:10px;
}
button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    cursor:pointer;
}
.card{
    margin-top:15px;
    padding:15px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    background:#fafafa;
}
.notfound{
    color:red;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>📦 ตรวจสอบสถานะออเดอร์</h1>

<input id="twitterId" placeholder="กรอก Twitter / Line ID">
<button onclick="searchOrder()">ค้นหา</button>

<div id="result"></div>
</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTlQXjybWNqhHPYyhqZLhjxr4zyBcrlFpPTpWkKhrihxQ2WMGVl3sqMnEpJJS4aa5YmgnzpLNjYd-wY/pub?output=csv";

async function searchOrder(){

    const keyword = document
        .getElementById("twitterId")
        .value
        .trim()
        .toLowerCase();

    const result = document.getElementById("result");
    result.innerHTML = "กำลังค้นหา...";

    try{

        const response = await fetch(SHEET_URL);
        const csv = await response.text();

        const rows = csv.split("\n").slice(1);

        let found = [];

        rows.forEach(row => {

            const cols = row.split(",");

            const twitter = (cols[0] || "")
            .replace(/"/g,"")
            .trim()
            .toLowerCase();

            if(twitter === keyword){

                found.push({
                    orderNo: cols[1] || "",
                    product: cols[2] || "",
                    status: cols[3] || "",
                    payment: cols[4] || "",
                    tracking: cols[5] || ""
                });
            }

        });

        if(found.length === 0){
            result.innerHTML =
            '<p class="notfound">ไม่พบข้อมูลออเดอร์</p>';
            return;
        }

        let html = "";

        found.forEach(item => {

            html += `
            <div class="card">
                <p><strong>Order No:</strong> ${item.orderNo}</p>
                <p><strong>Product:</strong> ${item.product}</p>
                <p><strong>Status:</strong> ${item.status}</p>
                <p><strong>Payment:</strong> ${item.payment}</p>
                <p><strong>Tracking:</strong> ${item.tracking}</p>
            </div>
            `;
        });

        result.innerHTML = html;

    }catch(error){

        result.innerHTML =
        "<p class='notfound'>เกิดข้อผิดพลาดในการโหลดข้อมูล</p>";

    }
}
</script>

</body>
</html>
